<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiki Monsters — Welcome to Chikoria</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#061426}
  #hero{
    position:fixed;inset:0;
    background:url("homepage-hero.png") center center/cover no-repeat;
    display:flex;align-items:flex-end;justify-content:center;
  }
  #playBtn{
    width:min(440px,52vw);margin-bottom:5.5vh;cursor:pointer;
    filter:drop-shadow(0 14px 26px rgba(0,0,0,.55));
    transition:transform .15s,filter .15s;
    animation:throb 1.8s ease-in-out infinite;
  }
  #playBtn:hover{transform:scale(1.05);filter:drop-shadow(0 18px 34px rgba(0,0,0,.6)) brightness(1.06)}
  #playBtn:active{transform:scale(.97)}
  @keyframes throb{50%{transform:scale(1.025)}}
  /* fallback if play-now.png is missing */
  #playFallback{
    display:none;margin-bottom:6vh;cursor:pointer;
    font-family:'Baloo 2','Segoe UI',sans-serif;font-weight:900;font-size:30px;
    color:#fff;text-transform:uppercase;letter-spacing:1px;
    padding:18px 60px;border-radius:14px;border:4px solid #2a1a08;
    background:linear-gradient(180deg,#ffd34d,#e89a06);
    box-shadow:inset 0 4px 0 rgba(255,255,255,.55),inset 0 -6px 0 rgba(0,0,0,.25),
      0 7px 0 #2a1a08,0 14px 28px rgba(0,0,0,.5);
    text-shadow:0 3px 0 rgba(42,26,8,.95);
  }
  #gameFrame{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:#061426}
  body.playing #hero{display:none}
  body.playing #gameFrame{display:block}
</style>
</head>
<body>
<div id="hero">
  <img id="playBtn" src="play-now.png" alt="PLAY NOW"
       onerror="this.style.display='none';document.getElementById('playFallback').style.display='block'">
  <div id="playFallback">▶ Play Now</div>
</div>
<iframe id="gameFrame" title="Chiki Monsters" allow="clipboard-write"></iframe>
<script>
  function startGame(){
    var f=document.getElementById("gameFrame");
    if(!f.src)f.src="play.html?embed=1";
    document.body.classList.add("playing");
  }
  document.getElementById("playBtn").onclick=startGame;
  document.getElementById("playFallback").onclick=startGame;
</script>
</body>
</html>
